version: "3.9"

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db

    ports:
      - "1521:1521"

    environment:
      ORACLE_PASSWORD: oracle

    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init.sql:/container-entrypoint-initdb.d/init.sql

    restart: unless-stopped

volumes:
  oracle-data: